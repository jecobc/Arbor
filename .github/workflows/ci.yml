name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          targets: wasm32v1-none,wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: cargo test (arbiter + escrow)
        run: cargo test --workspace --locked
      - name: install stellar CLI
        run: cargo install --locked stellar-cli --version 22.0.1 || cargo install --locked stellar-cli
      - name: stellar contract build
        run: stellar contract build

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - run: npm run build
        env:
          NEXT_PUBLIC_ESCROW_CONTRACT_ADDRESS: CAFJBQDCA2YBYMWSAMR64EDX52DYCNZ7C2E6JXFL5OGW6IMJXE62NUCN
          NEXT_PUBLIC_ARBITER_CONTRACT_ADDRESS: CATRV7RKBY24I6S3GU3JP6FNGXXR4BD6ZCVUSG6X5CBZAR4VLDZ4R2PC
          NEXT_PUBLIC_TOKEN_CONTRACT_ADDRESS: CDLZFC3SYJYDZT7K67VZ75HPJVIEUVNIXF47ZG2FB2RMQQVU2HHGCYSC
          NEXT_PUBLIC_ARBITER_ADDRESS: GA3KQN3NYZ5BOATCLL25F2BULS6RIHE2MQ3ZHC4UY4WX3KG4WDZA6YP6
          NEXT_PUBLIC_STELLAR_NETWORK: testnet
          NEXT_PUBLIC_STELLAR_RPC_URL: https://soroban-testnet.stellar.org:443
